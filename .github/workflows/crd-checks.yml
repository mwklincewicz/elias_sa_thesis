name: CRD checks

on:
  push:
  pull_request:

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run no-data checks
        run: make check
